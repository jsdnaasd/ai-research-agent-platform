{% extends "base.html" %}
{% block content %}
<section class="panel">
  <p class="pill">Evidence Explorer</p>
  <h1>{{ task.topic }}</h1>
  {% for finding in findings %}
  <article>
    <h2>{{ finding.claim }}</h2>
    <p class="muted">Citations: {{ finding.citations | join(", ") }}</p>
  </article>
  {% endfor %}
</section>
{% endblock %}
